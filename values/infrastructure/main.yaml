# Default values for monobase-infrastructure Helm chart
# These control cluster-wide infrastructure components
# Note: argocd.repoURL is injected from infrastructure-root.yaml bootstrap file

# ArgoCD - GitOps continuous delivery platform
# Chart: https://github.com/argoproj/argo-helm
# Version: 5.x+
argocd:
  # Global settings
  global:
    domain: argocd.example.com  # Set in client config

  # Simplified configuration (non-HA)
  redis-ha:
    enabled: false  # Use standard Redis instead

  # Controller (reconciliation engine)
  controller:
    replicas: 1  # Single replica sufficient for simple deployments

    metrics:
      enabled: true
      serviceMonitor:
        enabled: false  # Enable when monitoring stack is deployed

    resources:
      requests:
        cpu: 250m
        memory: 768Mi  # Increased from 512Mi - prevent OOM (actual usage: 607Mi)
      limits:
        cpu: 1
        memory: 896Mi  # Optimized from 1Gi (actual usage: 608Mi = 68%)

  # Server (API and UI)
  server:
    replicas: 1  # Single replica

    metrics:
      enabled: true
      serviceMonitor:
        enabled: false

    resources:
      requests:
        cpu: 100m
        memory: 192Mi  # Optimized from 256Mi (actual usage: 31Mi = 16%)
      limits:
        cpu: 500m
        memory: 384Mi  # Optimized from 512Mi (actual usage: 31Mi = 8%)

    # Ingress via Gateway API (see ingress.yaml)
    ingress:
      enabled: false

    # Server configuration
    config:
      url: https://argocd.example.com  # Set in client config

      # Git repository credentials
      repositories: |
        - type: git
          url: https://github.com/parmazip/monobase-infra.git

      # Resource customizations
      resource.customizations: |
        argoproj.io/Application:
          health.lua: |
            hs = {}
            hs.status = "Progressing"
            hs.message = ""
            if obj.status ~= nil then
              if obj.status.health ~= nil then
                hs.status = obj.status.health.status
                if obj.status.health.message ~= nil then
                  hs.message = obj.status.health.message
                end
              end
            end
            return hs

    # RBAC configuration
    rbacConfig:
      policy.default: role:readonly
      policy.csv: |
        # Default policies
        p, role:readonly, applications, get, */*, allow
        p, role:readonly, projects, get, *, allow

        # Admin role
        g, admin, role:admin

    # Admin password (from secret)
    extraArgs:
      - --insecure  # TLS termination at Gateway

  # Repo Server (Git repository interaction)
  repoServer:
    replicas: 1  # Single replica

    metrics:
      enabled: true
      serviceMonitor:
        enabled: false

    resources:
      requests:
        cpu: 100m
        memory: 1536Mi  # Increased to handle concurrent Helm renders
      limits:
        cpu: 1
        memory: 2560Mi  # Increased to prevent OOM during heavy sync operations

  # ApplicationSet Controller (App-of-Apps)
  applicationSet:
    enabled: true
    replicas: 1  # Single replica

    metrics:
      enabled: true
      serviceMonitor:
        enabled: false

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi

  # Notifications Controller
  notifications:
    enabled: true

    argocdUrl: https://argocd.example.com

    notifiers:
      # Slack notifications
      service.slack: |
        token: $slack-token

      # Email notifications
      service.email: |
        host: smtp.gmail.com
        port: 587
        from: argocd@example.com

    templates:
      template.app-deployed: |
        message: |
          Application {{.app.metadata.name}} deployed to {{.app.spec.destination.namespace}}
        slack:
          attachments: |
            [{
              "title": "{{.app.metadata.name}}",
              "title_link": "{{.context.argocdUrl}}/applications/{{.app.metadata.name}}",
              "color": "#18be52",
              "fields": [{
                "title": "Sync Status",
                "value": "{{.app.status.sync.status}}",
                "short": true
              }, {
                "title": "Repository",
                "value": "{{.app.spec.source.repoURL}}",
                "short": true
              }]
            }]

      template.app-sync-failed: |
        message: |
          Application {{.app.metadata.name}} sync failed
        slack:
          attachments: |
            [{
              "title": "{{.app.metadata.name}}",
              "title_link": "{{.context.argocdUrl}}/applications/{{.app.metadata.name}}",
              "color": "#ff0000",
              "fields": [{
                "title": "Sync Status",
                "value": "{{.app.status.sync.status}}",
                "short": true
              }]
            }]

    triggers:
      trigger.on-deployed: |
        - when: app.status.sync.status == 'Synced'
          send: [app-deployed]

      trigger.on-sync-failed: |
        - when: app.status.sync.status == 'Failed'
          send: [app-sync-failed]

  # Dex (SSO/OAuth - optional)
  dex:
    enabled: false  # Enable for SSO integration

  # Configs
  configs:
    secret:
      createSecret: true
      # argocdServerAdminPassword: ""  # Set via External Secrets

    # Known hosts for Git SSH
    ssh:
      knownHosts: |
        github.com ssh-rsa 

  # Redis (cache) - standard single instance
  redis:
    enabled: true

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 128Mi

# Cert Manager - TLS certificate automation
certManager:
  enabled: true
  version: v1.16.2

# Cert Manager Resources - ClusterIssuers and certificate configuration
certManagerIssuers:
  enabled: true
  issuers:
    # HTTP-01 challenge type (no DNS provider needed)
    - name: letsencrypt-prod
      email: "admin@parmazip.com"
      server: production
      provider: http01
      http01:
        gatewayName: shared-gateway
        gatewayNamespace: gateway-system
    
    - name: letsencrypt-staging
      email: "admin@parmazip.com"
      server: staging
      provider: http01
      http01:
        gatewayName: shared-gateway
        gatewayNamespace: gateway-system

# Envoy Gateway - Gateway API implementation
envoyGateway:
  enabled: true
  version: v1.2.0

# EnvoyProxy Configuration - Cloud-specific LoadBalancer settings
envoyProxyConfig:
  enabled: false  # Override per deployment
  name: custom-proxy-config
  namespace: envoy-gateway-system
  serviceAnnotations: true
  cloudProvider: none

  azure:
    publicIpName: ""
    resourceGroup: ""
    ipv4Address: ""

  aws:
    eipAllocations: ""

  gcp:
    staticIpAddress: ""

  digitalocean:
    loadBalancerId: ""
    loadBalancerName: ""

  customAnnotations: {}

# Gateway Resources - Shared Gateway configuration
gateway:
  # Base domain for gateway (override per deployment)
  domain: parmazip.com

  # Gateway configuration
  gateway:
    name: shared-gateway
    namespace: gateway-system
    gatewayClassName: envoy-gateway
    listeners:
      https:
        enabled: true
        port: 443
        protocol: HTTPS
        # hostname automatically derived from gateway.domain as *.parmazip.com
      http:
        enabled: true
        port: 80
        protocol: HTTP
        # hostname automatically derived from gateway.domain as *.parmazip.com

  # TLS/Certificate configuration - Per-app certificates
  clusterIssuer: letsencrypt-prod

  certificates:
    # Staging environment
    - name: staging-api-tls
      hostname: api.stg.parmazip.com
      enabled: true
    - name: staging-account-tls
      hostname: account.stg.parmazip.com
      enabled: true
    - name: staging-patient-tls
      hostname: patient.stg.parmazip.com
      enabled: true
    - name: staging-provider-tls
      hostname: provider.stg.parmazip.com
      enabled: true
    - name: staging-website-tls
      hostname: www.stg.parmazip.com
      enabled: true
    - name: staging-minio-tls
      hostname: storage.stg.parmazip.com
      enabled: true
    - name: staging-mailpit-tls
      hostname: mailpit.stg.parmazip.com
      enabled: true

    # Production environment
    - name: production-api-tls
      hostname: api.parmazip.com
      enabled: true
    - name: production-storage-tls
      hostname: storage.parmazip.com
      enabled: true

  # HTTP to HTTPS redirect
  httpRedirect:
    enabled: false  # Disabled: wildcard redirect incompatible with HTTP-01
    statusCode: 301

# External Secrets - Secret management
externalSecrets:
  enabled: true
  version: 0.9.11
  provider: gcp

  # ClusterSecretStore configurations
  # See charts/external-secrets-stores/README.md for detailed configuration
  stores:
    # GCP Secret Manager store (current setup)
    - name: gcp-secretstore
      provider: gcp
      gcp:
        projectId: "mc-v4-prod"  # GCP Secret Manager project
        auth:
          # Using Service Account Key authentication (works on any K8s cluster)
          serviceAccountKey:
            enabled: true
            secretRef:
              name: gcpsm-secret
              key: secret-access-credentials
              namespace: external-secrets-system
          # Alternative: Workload Identity (for GKE only)
          workloadIdentity:
            enabled: false
            clusterLocation: us-central1
            clusterName: ""
            serviceAccountRef:
              name: external-secrets
              namespace: external-secrets-system

# External DNS - Automatic DNS record management from HTTPRoutes
externalDNS:
  enabled: true

  # External Secrets configuration
  # Creates ExternalSecret to sync DNS provider API token from secret manager
  externalSecrets:
    enabled: true
    secretStore: "gcp-secretstore"
    refreshInterval: "1h"
    remoteKey: "parmazip-infra-cloudflare-api-token"
    generator:
      generate: false
      type: token
      description: "Cloudflare API token for DNS management"

  # External DNS image configuration
  image:
    registry: registry.k8s.io
    repository: external-dns/external-dns
    tag: "v0.19.0"
    pullPolicy: IfNotPresent

  # Multiple External DNS instances
  # Each instance can manage different DNS provider and domains
  instances:
    # Primary instance: Cloudflare for parmazip.com (all environments)
    - name: primary
      enabled: true
      provider: cloudflare

      # Manage all parmazip.com subdomains across all namespaces
      domainFilters:
        - parmazip.com

      # Cloudflare-specific configuration
      cloudflare:
        proxied: false  # DNS only, no Cloudflare proxy
        apiTokenSecretRef:
          name: cloudflare-api-token
          key: api-token

      # Resource limits
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 50m
          memory: 64Mi

    # Example: Add new client with different DNS provider
    # - name: client-a
    #   enabled: true
    #   provider: route53
    #   domainFilters:
    #     - clienta.com
    #   aws:
    #     region: us-east-1
    #     zoneType: public
    #   resources:
    #     requests:
    #       cpu: 10m
    #       memory: 32Mi
    #     limits:
    #       cpu: 50m
    #       memory: 64Mi

  # Global configuration applied to all instances
  global:
    # Sources to watch (applied to all instances)
    sources:
      - gateway-httproute
      - gateway-tcproute
      - gateway-tlsroute
      - service

    # Policy: sync (create+update+delete) or upsert-only (create+update)
    policy: sync

    # Registry type for tracking ownership
    registry: txt

    # TXT record prefix
    txtPrefix: "external-dns-"

    # Log level: panic, debug, info, warning, error, fatal
    logLevel: info

    # Log format: text or json
    logFormat: text

    # Interval between DNS updates
    interval: 1m

    # Trigger loop on create (in addition to interval)
    triggerLoopOnEvent: true

  # Pod-level security context (PodSecurity restricted compliant)
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534  # nobody user
    fsGroup: 65534
    seccompProfile:
      type: RuntimeDefault

# Kyverno - Policy engine
kyverno:
  enabled: false  # Optional, enable for policy enforcement
  version: 3.2.0
  policies:
    enabled: false  # Only if kyverno.enabled=true

# Velero - Backup and disaster recovery
velero:
  enabled: false  # Enable for production clusters with backup requirements
  version: 7.1.4
  provider: gcp  # Options: aws, azure, gcp, digitalocean, minio
  
  # AWS S3 configuration
  aws:
    region: us-east-1
    bucket: ""  # Set to S3 bucket name (e.g., my-cluster-velero-backups)
    roleArn: ""  # Auto-populated from terraform output (IRSA)
  
  # Azure Blob Storage configuration
  azure:
    resourceGroup: ""  # Set to Azure resource group
    storageAccount: ""  # Set to storage account name
    blobContainer: ""  # Set to blob container name (e.g., velero-backups)
    subscriptionId: ""  # Optional, auto-detected if not set
    identityClientId: ""  # Auto-populated from terraform output (Workload Identity)
  
  # GCP Cloud Storage configuration
  gcp:
    bucket: ""  # Set to GCS bucket name (e.g., my-cluster-velero-backups)
    projectId: ""  # Set to GCP project ID
    region: us-central1
    serviceAccount: ""  # Auto-populated from terraform output (Workload Identity)
  
  # DigitalOcean Spaces configuration
  digitalocean:
    bucket: ""  # Set to Spaces bucket name
    region: nyc3  # Spaces region: nyc3, sfo3, sgp1, fra1, ams3
    accessKey: ""  # Via External Secrets or manual secret
    secretKey: ""  # Via External Secrets or manual secret
  
  # MinIO configuration (for K3D/local development)
  minio:
    bucket: velero-backups
    url: http://minio.velero.svc:9000
    publicUrl: http://localhost:9000
    accessKey: minio
    secretKey: minio123
  
  # Backup schedules configuration
  schedules:
    # Infrastructure namespace backups
    infrastructure:
      daily:
        enabled: true
        schedule: "0 3 * * *"  # 3 AM daily
        retention: 720h  # 30 days
      hourly:
        enabled: false  # Optional, for critical infrastructure
        schedule: "0 * * * *"  # Every hour
        retention: 72h  # 3 days
    
    # Cluster-wide resource backups
    cluster:
      weekly:
        enabled: true
        schedule: "0 4 * * 0"  # 4 AM Sunday
        retention: 2160h  # 90 days

# Falco - Runtime security monitoring
falco:
  enabled: false  # Optional, enable for runtime threat detection
  version: 4.6.1
  rules:
    enabled: false  # Only if falco.enabled=true

# Monitoring - Prometheus + Grafana stack
monitoring:
  enabled: true  # Optional, enable for observability
  version: 11.x.x  # Bitnami kube-prometheus chart version
  
  # Prometheus configuration
  prometheus:
    retention: 30d  # How long to keep metrics
    storageSize: 50Gi  # Prometheus data storage
    storageClass: ""  # Auto-detect from cluster default
  
  # Grafana configuration (deployed as separate wrapper chart)
  grafana:
    enabled: true  # Enable Grafana deployment

    # Bitnami grafana subchart values (nested under 'grafana:')
    grafana:
      admin:
        user: admin
        password: admin  # Override via External Secrets in production

      # Use bitnamilegacy image (consistency with monitoring stack)
      image:
        registry: docker.io
        repository: bitnamilegacy/grafana

      resources:
        requests:
          cpu: "50m"
          memory: "150Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"

      persistence:
        enabled: true
        size: 10Gi
        storageClass: ""  # Auto-detect from cluster default

      # Dashboard provider configuration
      dashboardsProvider:
        enabled: true

      # Dashboard ConfigMaps to load
      dashboardsConfigMaps:
        - configMapName: grafana-dashboard-global
          fileName: global.json
        - configMapName: grafana-dashboard-nodes
          fileName: nodes.json
        - configMapName: grafana-dashboard-namespaces
          fileName: namespaces.json
        - configMapName: grafana-dashboard-pods
          fileName: pods.json
        - configMapName: grafana-dashboard-apiserver
          fileName: api-server.json
        - configMapName: grafana-dashboard-prometheus
          fileName: prometheus.json

    # Wrapper chart gateway configuration (not nested)
    gateway:
      enabled: true
      hostname: ""  # Uses grafana.{domain}
      tls:
        certManager:
          enabled: true  # Enable automatic TLS certificate provisioning
  
  # Alertmanager configuration
  alertmanager:
    enabled: true
    storageClass: ""  # Auto-detect
    
    # Slack notifications (optional)
    slack:
      webhookUrl: ""  # Set to Slack webhook URL for alerts
    
    # Email notifications (optional)
    email:
      smarthost: ""  # SMTP server (e.g., smtp.gmail.com:587)
      from: ""  # From email address
      to: ""  # To email address
