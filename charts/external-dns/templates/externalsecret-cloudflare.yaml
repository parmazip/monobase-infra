{{- if and .Values.enabled .Values.cloudflare.externalSecret.enabled }}
# ExternalSecret: Cloudflare API Token for external-dns
# Syncs Cloudflare API token from GCP Secret Manager to external-dns namespace

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "external-dns.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.cloudflare.externalSecret.refreshInterval | default "1h" }}

  secretStoreRef:
    name: {{ .Values.cloudflare.externalSecret.secretStore | default "gcp-secretstore" }}
    kind: ClusterSecretStore

  target:
    name: cloudflare-api-token
    creationPolicy: Owner

  data:
    - secretKey: api-token
      remoteRef:
        key: {{ .Values.cloudflare.externalSecret.remoteKey | default "infrastructure-cloudflare-api-token" }}
{{- end }}
