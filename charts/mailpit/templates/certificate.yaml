{{- if and .Values.enabled .Values.gateway.enabled .Values.gateway.tls.certManager.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.gateway.tls.secretName }}
  namespace: {{ include "mailpit.namespace" . }}
  labels:
    {{- include "mailpit.labels" . | nindent 4 }}
spec:
  secretName: {{ .Values.gateway.tls.secretName }}
  dnsNames:
    - {{ include "mailpit.gateway.hostname" . }}
  issuerRef:
    name: {{ .Values.gateway.tls.certManager.clusterIssuer }}
    kind: ClusterIssuer
    group: cert-manager.io
{{- end }}
