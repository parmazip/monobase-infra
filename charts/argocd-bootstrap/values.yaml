# Minimal values for argocd-bootstrap chart
# Most configuration comes from values/infrastructure/main.yaml
#
# This chart creates the ArgoCD Applications that bootstrap the cluster:
# 1. Infrastructure root Application (deploys charts/argocd-infrastructure/)
# 2. ApplicationSet for auto-discovering client deployments (uses charts/argocd-applications/)
#
# Values are inherited from values/infrastructure/main.yaml when deployed:
#   helm upgrade --install argocd-bootstrap charts/argocd-bootstrap \
#     --values values/infrastructure/main.yaml
#
# Required values (from values/infrastructure/main.yaml):
#   argocd.repoURL          - Git repository URL
#   argocd.targetRevision   - Git branch/tag
#   argocd.namespace        - ArgoCD namespace (default: argocd)
#   argocd.clusterServer    - Kubernetes API server URL
